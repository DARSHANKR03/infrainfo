<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#buildingGradient)"/>
  
  <!-- Main building -->
  <rect x="30" y="25" width="40" height="50" fill="#1e3a8a" rx="2"/>
  
  <!-- Windows - rows of 3x5 -->
  <rect x="35" y="30" width="6" height="5" fill="#60a5fa" rx="1"/>
  <rect x="47" y="30" width="6" height="5" fill="#60a5fa" rx="1"/>
  <rect x="59" y="30" width="6" height="5" fill="#60a5fa" rx="1"/>
  
  <rect x="35" y="38" width="6" height="5" fill="#60a5fa" rx="1"/>
  <rect x="47" y="38" width="6" height="5" fill="#60a5fa" rx="1"/>
  <rect x="59" y="38" width="6" height="5" fill="#60a5fa" rx="1"/>
  
  <rect x="35" y="46" width="6" height="5" fill="#60a5fa" rx="1"/>
  <rect x="47" y="46" width="6" height="5" fill="#60a5fa" rx="1"/>
  <rect x="59" y="46" width="6" height="5" fill="#60a5fa" rx="1"/>
  
  <rect x="35" y="54" width="6" height="5" fill="#fbbf24" rx="1"/>
  <rect x="47" y="54" width="6" height="5" fill="#fbbf24" rx="1"/>
  <rect x="59" y="54" width="6" height="5" fill="#60a5fa" rx="1"/>
  
  <rect x="35" y="62" width="6" height="5" fill="#60a5fa" rx="1"/>
  <rect x="47" y="62" width="6" height="5" fill="#60a5fa" rx="1"/>
  <rect x="59" y="62" width="6" height="5" fill="#60a5fa" rx="1"/>
  
  <!-- Door -->
  <rect x="44" y="68" width="12" height="7" fill="#0f172a" rx="1"/>
  
  <!-- Side buildings -->
  <rect x="20" y="45" width="8" height="30" fill="#1e40af" rx="1"/>
  <rect x="72" y="50" width="8" height="25" fill="#1e40af" rx="1"/>
  
  <!-- Small windows on side buildings -->
  <rect x="22" y="48" width="4" height="3" fill="#93c5fd" rx="0.5"/>
  <rect x="22" y="53" width="4" height="3" fill="#93c5fd" rx="0.5"/>
  <rect x="22" y="58" width="4" height="3" fill="#93c5fd" rx="0.5"/>
  <rect x="22" y="63" width="4" height="3" fill="#93c5fd" rx="0.5"/>
  
  <rect x="74" y="53" width="4" height="3" fill="#93c5fd" rx="0.5"/>
  <rect x="74" y="58" width="4" height="3" fill="#93c5fd" rx="0.5"/>
  <rect x="74" y="63" width="4" height="3" fill="#93c5fd" rx="0.5"/>
  
  <!-- Cloud accent -->
  <ellipse cx="70" cy="20" rx="8" ry="5" fill="#dbeafe" opacity="0.7"/>
  <ellipse cx="75" cy="18" rx="6" ry="4" fill="#dbeafe" opacity="0.7"/>
</svg>
